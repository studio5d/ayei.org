<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AYEI Volunteer Form</title>
<style>
body { font-family: Arial; background:#f5f7fa; }
.container { max-width:700px; margin:40px auto; background:white; padding:30px; border-radius:10px; box-shadow:0 4px 15px rgba(0,0,0,0.1);}
h2{text-align:center;color:#1a73e8;}
.step{display:none;}
input, select, textarea{width:100%; padding:10px; margin-top:5px; border-radius:5px;border:1px solid #ccc;}
button{width:100%; padding:12px; margin-top:20px; background:#1a73e8; color:white; border:none; border-radius:5px; cursor:pointer;}
button:hover{background:#1557b0;}
</style>
</head>
<body>
<div class="container">
<h2>AYEI Volunteer Application</h2>
<form id="volunteerForm" action="YOUR_GOOGLE_FORM_ENDPOINT" method="POST" enctype="multipart/form-data">

<!-- Step 1 -->
<div class="step" id="step1" style="display:block;">
<input type="text" name="entry.123456" placeholder="Full Name" required>
<input type="email" name="entry.654321" placeholder="Email" required>
<input type="text" name="entry.111222" placeholder="Phone Number" required>
<input type="text" name="entry.333444" placeholder="City / Location" required>
<button type="button" onclick="nextStep(1)">Next</button>
</div>

<!-- Step 2 -->
<div class="step" id="step2">
<select name="entry.555666" required>
<option value="">Volunteer Type</option>
<option>General Volunteer</option>
<option>Event Volunteer</option>
</select>
<select name="entry.777888" required>
<option value="">Department</option>
<option>Programs & Training</option>
<option>Community Management</option>
<option>Social Media & Content</option>
<option>Event Planning</option>
<option>Logistics Team</option>
</select>
<input type="text" name="entry.999000" placeholder="Skills">
<input type="text" name="entry.222333" placeholder="Availability (hours/week)">
<button type="button" onclick="prevStep(2)">Previous</button>
<button type="button" onclick="nextStep(2)">Next</button>
</div>

<!-- Step 3 -->
<div class="step" id="step3">
<select name="entry.444555">
<option>Event Experience?</option>
<option>Yes</option>
<option>No</option>
</select>
<textarea name="entry.666777" placeholder="Why do you want to volunteer with AYEI?"></textarea>
<input type="file" name="entry.888999" accept=".pdf,.doc,.docx">
<button type="button" onclick="prevStep(3)">Previous</button>
<button type="submit">Submit</button>
</div>

</form>
</div>

<script>
let currentStep = 1;
function nextStep(step){
document.getElementById(`step${step}`).style.display="none";
currentStep++;
document.getElementById(`step${currentStep}`).style.display="block";
}
function prevStep(step){
document.getElementById(`step${step}`).style.display="none";
currentStep--;
document.getElementById(`step${currentStep}`).style.display="block";
}
</script>
</body>
</html>
