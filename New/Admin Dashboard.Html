<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AYEI Admin Dashboard</title>

<style>

/* ===== GLOBAL ===== */
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#0a1f44,#0f3d2e);
    color: #fff;
}

/* Sidebar */
.sidebar {
    width: 220px;
    height: 100vh;
    position: fixed;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);
    padding: 20px;
}

.sidebar h2 {
    font-size: 18px;
}

.sidebar a {
    display: block;
    margin: 15px 0;
    color: #fff;
    text-decoration: none;
}

/* Main */
.main {
    margin-left: 240px;
    padding: 30px;
}

/* Cards */
.cards {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
}

.card {
    flex: 1;
    min-width: 180px;
    background: rgba(255,255,255,0.1);
    padding: 20px;
    border-radius: 15px;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 20px rgba(0,255,136,0.4);
}

/* Table */
table {
    width: 100%;
    margin-top: 30px;
    border-collapse: collapse;
    background: rgba(255,255,255,0.08);
    border-radius: 10px;
    overflow: hidden;
}

th, td {
    padding: 12px;
    text-align: left;
}

th {
    background: rgba(0,255,136,0.3);
}

/* 2026 FUTURE BUTTON */
.future-btn {
    padding: 8px 18px;
    border-radius: 30px;
    border: none;
    cursor: pointer;
    color: #fff;
    background: linear-gradient(135deg,#00ff88,#00c6ff,#ff00cc);
    background-size: 300% 300%;
    animation: gradientFlow 6s linear infinite;
    transition: 0.3s;
}

@keyframes gradientFlow {
    0% { background-position: 0% 50%; }
    100% { background-position: 300% 50%; }
}

.future-btn:hover {
    transform: scale(1.05);
}

.delete-btn {
    background: linear-gradient(135deg,#ff004c,#ff6a00);
}

</style>
</head>
<body>

<div class="sidebar">
    <h2>AYEI Admin</h2>
    <a href="#">Dashboard</a>
    <a href="#">Members</a>
    <a href="#">Payments</a>
    <a href="#">Settings</a>
    <a href="#">Logout</a>
</div>

<div class="main">

<h1>Dashboard Overview</h1>

<div class="cards">
    <div class="card">
        <h3>Total Members</h3>
        <p id="totalMembers">120</p>
    </div>

    <div class="card">
        <h3>Volunteers</h3>
        <p>35</p>
    </div>

    <div class="card">
        <h3>Corporate Members</h3>
        <p>10</p>
    </div>
</div>

<h2>Member List</h2>

<select id="filterMembership">
    <option value="">Filter by Membership</option>
    <option value="Student">Student Member</option>
    <option value="NYSC">NYSC Member</option>
    <option value="Volunteer">Recent Graduate</option>
    <option value="Corporate">Youth Professional </option>
    <option value="Student">Entrepreneur</option>
    <option value="NYSC">Volunteer </option>
    <option value="Volunteer">Ambassador </option>
    <option value="Corporate">Corporate Member </option>
</select>

<table>
    <thead>
        <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Membership</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody id="memberTable">
        <tr>
            <td>John Doe</td>
            <td>john@email.com</td>
            <td>Student</td>
            <td>
                <button class="future-btn">Approve</button>
                <button class="future-btn delete-btn">Delete</button>
            </td>
        </tr>
    </tbody>
</table>

</div>

<script>
// Simple filter
document.getElementById("filterMembership").addEventListener("change", function() {
    const filter = this.value.toLowerCase();
    const rows = document.querySelectorAll("#memberTable tr");

    rows.forEach(row => {
        const membership = row.cells[2].innerText.toLowerCase();
        row.style.display = membership.includes(filter) || filter === "" ? "" : "none";
    });
});
</script>

</body>
</html>
